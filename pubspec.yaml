name: sales_hibiscus_mobile
description: Aplikasi Mobile JURNAL HE M.B.K

publish_to: 'none'
version: 1.0.0+7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.2.0
  provider: ^6.1.0
  intl: ^0.19.0
  url_launcher: ^6.2.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  permission_handler: ^11.3.0
  image_picker: ^1.0.0
  camera: ^0.11.0+1
  file_picker: ^8.0.0
  share_plus: ^9.0.0
  path_provider: ^2.1.0
  cached_network_image: ^3.3.0
  open_filex: ^4.3.2
  fl_chart: ^0.68.0
  qr_flutter: ^4.1.0
  esc_pos_utils_plus: ^2.0.4
  flutter_bluetooth_serial: ^0.4.0
  barcode_widget: ^2.0.3
  mobile_scanner: ^5.1.1
  shimmer: ^3.0.0
  pdf: ^3.11.0
  printing: ^5.13.0
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/iconapk.jpeg
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/iconapk.jpeg

flutter:
  uses-material-design: true

  assets:
    - assets/images/hibiscusefsya1.png
    - assets/images/hibiscusefsya1-removebg-preview.png
    - assets/images/iconapk.jpeg

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
